<style>
  :root {

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

    flex-direction: column;

  .icon { width: 16px; height: 16px; }
  .icon-stroke { stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .icon-fill { fill: currentColor; stroke: none; }
  .paste-btn .icon { width: 14px; height: 14px; }
  .option-label .icon { width: 12px; height: 12px; }
  .result-thumb .icon { width: 24px; height: 24px; }
  .dl-type-icon .icon { width: 16px; height: 16px; }
  .dl-section-title .icon { width: 12px; height: 12px; }

  /* ------ Header ------ */
  header {
    padding: 26px 0 28px;
    text-align: center;
  }

  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 10px;
    animation: fadeInUp .6s ease both;
  }

  .logo-text {
    font-size: clamp(26px, 7vw, 34px);
    font-weight: 800;
    letter-spacing: -1px;
  }

  .tagline {
    font-size: 12px;
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* ------ Supported platforms ------ */
  .platforms {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 12px 0 22px;

    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .platforms span { opacity: 0.7; }
  .platforms { animation: fadeInUp .7s ease both; animation-delay: .05s; }

  /* ------ Input card ------ */
  .input-card {
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    transition: border-color .3s, box-shadow .3s;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    backdrop-filter: blur(6px);
  }
  .input-card { animation: fadeInUp .8s ease both; animation-delay: .1s; }

  .input-card.active { border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,138,61,0.25); }
  .input-card.error-state { border-color: var(--danger); }

  .input-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,138,61,0.45), transparent);
    opacity: 0;
    transition: opacity .3s;
  }

  .input-card.active::before { opacity: 1; }

  .input-label {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .input-label span {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
  }

  .url-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .url-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    width: 100%;
  }

  .url-input::placeholder { color: var(--text3); }
  .url-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,138,61,0.12); }

  .paste-btn {
    display: none;
  }

  /* ------ Download toolbar ------ */
  .dl-toolbar {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;

  }

  .dl-tab {
    border: 1px solid var(--border);
    background: var(--bg3);

    border-radius: 999px;
    padding: 6px 10px;
    font-size: 10px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: border-color .2s, color .2s, background .2s;
  }

  .dl-tab.active {
    border-color: var(--accent);
    color: var(--text);
    background: rgba(255,138,61,0.12);
  }

  /* ------ Fetch button ------ */
  .fetch-btn {
    width: 100%;
    margin-top: 12px;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: 1px solid rgba(255,138,61,0.45);
    border-radius: var(--radius-sm);
    color: #0b0e12;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .fetch-btn:hover { border-color: var(--accent); box-shadow: 0 12px 28px rgba(0,0,0,0.25), 0 0 24px rgba(255,138,61,0.25); }
  .fetch-btn:active { transform: translateY(0); }
  .fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #0b0e12;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ------ Error message ------ */
  .error-msg {
    display: none;
    margin-top: 10px;
    padding: 10px 12px;
    background: rgba(255,77,106,0.08);
    border: 1px solid rgba(255,77,106,0.25);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: #ff8fa0;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.5;
  }

  /* ------ Result card ------ */
  .result-card {
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: none;
    animation: slideUp .45s cubic-bezier(.16,1,.3,1);
    box-shadow: 0 14px 40px rgba(0,0,0,0.3);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .result-thumb {
    width: 60px;
    height: 44px;
    border-radius: 8px;
    object-fit: cover;
    background: var(--bg3);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .result-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }

  .result-info { flex: 1; overflow: hidden; }

  .result-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }

  .result-meta {
    font-size: 10px;
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .result-meta .tag {
    background: transparent;
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 999px;
    font-size: 9px;
  }

  /* ------ Download options ------ */
  .dl-options { padding: 8px 12px 12px; }

  .dl-section-title {
    font-size: 9px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .dl-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 6px;
    margin-bottom: 10px;
  }

  .dl-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 8px;
    cursor: pointer;
    transition: border-color .2s, transform .2s, background .2s;
    text-align: left;
    font-family: 'Syne', sans-serif;
    color: var(--text);
    position: relative;
    overflow: hidden;
  }

  .dl-btn:hover {
    border-color: rgba(255,138,61,0.6);
    background: rgba(255,138,61,0.08);
    transform: translateY(-1px);

  .dl-btn:active { transform: translateY(0); }
  .dl-btn.audio:hover { border-color: rgba(255,179,71,0.7); background: rgba(255,179,71,0.08); }
  .dl-btn.image:hover { border-color: rgba(255,208,138,0.7); background: rgba(255,208,138,0.08); }

  .dl-type-icon { display: inline-flex; align-items: center; justify-content: center; margin-bottom: 3px; opacity: 0.8; }
  .dl-type-label { font-size: 11px; font-weight: 700; display: block; margin-bottom: 2px; letter-spacing: 0.3px; }
  .dl-type-quality {
    font-size: 9px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text3);
  }



  /* ------ Notice ------ */
  

  /* ------ Footer ------ */
  footer {
    margin-top: auto;
    text-align: center;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text3);
    padding-top: 28px;
    padding-bottom: 20px;

  /* ------ Download progress ------ */

  @media (max-height: 760px) {
    body { align-items: flex-start; }

  /* ------ Tooltip ------ */
  [data-tooltip] { position: relative; }
  [data-tooltip]::after {
    content: attr(data-tooltip);

    padding: 10px 20px;

    align-items: center;
    gap: 8px;
    transition: transform .3s cubic-bezier(.16,1,.3,1), opacity .3s;
    opacity: 0;
    z-index: 999;
    pointer-events: none;

    transform: translateX(-50%) translateY(0);
